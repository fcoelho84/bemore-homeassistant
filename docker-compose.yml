services:
  assistant:
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./config/data:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    network_mode: host

  wyoming-whisper:
    image: rhasspy/wyoming-whisper:latest
    command: --model medium --language pt
    volumes:
      - ./wyoming-whisper/data:/data
    ports:
      - 10300:10300
    restart: unless-stopped

  wyoming-piper:
    image: rhasspy/wyoming-piper:latest
    command: --voice pt_BR-faber-medium --length-scale 0.85 --noise-scale 0.3 --noise-w 0.3
    volumes:
      - ./wyoming-piper/data:/data
    ports:
      - 10200:10200
    restart: unless-stopped

  wyoming-wakeword:
    image: rhasspy/wyoming-openwakeword:latest
    command: --preload-model 'bmo' --custom-model-dir /custom --threshold 0.7 --trigger-level 2
    volumes:
      - ./wyoming-wakeword/data:/data
      - ./wyoming-wakeword/custom:/custom
    ports:
      - 10400:10400
    restart: unless-stopped

  wyoming-satellite:
    build: ./wyoming-satellite
    command: >
      --name satellite
      --uri tcp://0.0.0.0:10500
      --mic-command 'arecord -D plughw:0,7 -r 16000 -c 1 -f S16_LE -t raw'
      --snd-command 'aplay -D pulse -r 22050 -c 1 -f S16_LE -t raw'
      --wake-uri tcp://wyoming-wakeword:10400
      --wake-word-name bmo
      --awake-wav /sounds/awake.wav
      --done-wav /sounds/done.wav
      --debug
    environment:
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
    volumes:
      - ./wyoming-satellite/sounds:/sounds:ro
      - /run/user/1000/pulse:/run/user/1000/pulse
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    ports:
      - 10500:10500
    depends_on:
      - wyoming-wakeword
    restart: unless-stopped